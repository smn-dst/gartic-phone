<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <title>Gartic Phone</title>
</head>

<body>
    <!-- login -->
    <div id="login-screen">
        <h1>Rejoindre la partie</h1>
        <input id="input-pseudo" placeholder="Ton pseudo" />
        <button id="btn-rejoindre">Rejoindre</button>
    </div>

    <!-- lobby -->
    <div id="lobby-screen" style="display: none;">
        <h1>Salon</h1>
        <p id="lobby-me"></p>
        <button id="btn-ready">Je suis prêt</button>
        <p id="lobby-status"></p>
        <h2>Joueurs connectés :</h2>
        <ul id="players-list"></ul>
        <button id="btn-leave">Changer de pseudo</button>
    </div>

    <!-- word -->
    <div id="word-screen" style="display: none;">
        <h1>Ton mot</h1>
        <p>Temps restant : <span id="word-timer"></span></p>
        <input id="word-input" placeholder="Écris un mot" />
        <button id="word-submit">Valider</button>
    </div>

    <!-- task (stub texte) -->
    <div id="task-screen" style="display: none;">
        <h1 id="task-title"></h1>
        <p id="task-previous"></p>
        <input id="task-input" placeholder="Ta réponse (texte pour l'instant)" />
        <button id="task-submit">Valider</button>
    </div>

    <!-- waiting -->
    <div id="waiting-screen" style="display: none;">
        <h1>En attente des autres joueurs...</h1>
    </div>

    <!-- over -->
    <div id="over-screen" style="display: none;">
        <h1>Partie terminée</h1>
        <pre id="over-content"></pre>
    </div>

    <script src="/app.js"></script>
</body>

</html>
